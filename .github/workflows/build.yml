name: Build WDA IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build WebDriverAgent
        run: |
          mkdir -p Payload
          
          echo "Starte Xcode Build (Signatur-Fehler werden ignoriert)..."
          # Das "|| true" am Ende ist der Gamechanger. Es verhindert den Crash!
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" || true

          # Suchen der gebauten App
          TARGET_APP=$(find build/Build/Products -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          
          if [ -z "$TARGET_APP" ]; then
            echo "Fehler: Runner.app nicht gefunden! Build ist komplett fehlgeschlagen."
            exit 1
          fi

          echo "App erfolgreich gefunden unter: $TARGET_APP"
          
          # Kopieren mit ALLEN Rechten und Unterordnern (-a)
          cp -a "$TARGET_APP" Payload/
          
          # Zippen zur IPA
          zip -r WebDriverAgent.ipa Payload/
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-IPA
          path: WebDriverAgent.ipa
