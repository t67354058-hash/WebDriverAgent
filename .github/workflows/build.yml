name: Build WDA IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build WebDriverAgent
        run: |
          mkdir -p Payload
          # Wir bauen gezielt das Runner-Ziel, das ist stabiler für IPAs
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

          # Wir suchen ALLES, was auf .app endet im Build-Ordner
          find build/Build/Products -name "*.app" -type d
          
          # Wir nehmen den WebDriverAgentRunner-Runner.app
          TARGET_APP=$(find build/Build/Products -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          
          if [ -z "$TARGET_APP" ]; then
            echo "Fehler: Runner.app nicht gefunden!"
            exit 1
          fi

          echo "Kopiere App von: $TARGET_APP"
          cp -PR "$TARGET_APP" Payload/
          
          # Wir packen es ein
          zip -ry WebDriverAgent.ipa Payload/
          
      - name: Upload IPA
        uses: uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-IPA
          path: WebDriverAgent.ipa
