name: Build WDA IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14 # Wir nehmen eine feste Version für mehr Stabilität
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # Lädt alle Abhängigkeiten mit

      - name: Build WebDriverAgent
        run: |
          mkdir -p Payload
          # Wir erzwingen den Build OHNE Signierung
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

          # Wir suchen die App im Build-Ordner, egal wo sie genau liegt
          APP_PATH=$(find build/Build/Products -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          echo "Gefundener App-Pfad: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "Fehler: App wurde nicht gefunden!"
            exit 1
          fi

          cp -r "$APP_PATH" Payload/
          zip -r WebDriverAgent.ipa Payload/
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-IPA
          path: WebDriverAgent.ipa
